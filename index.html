<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sinematik Produksiyon Teklif</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080808;color:#e8e8e8;font-family:Inter,sans-serif;min-height:100vh}
.hdr{border-bottom:1px solid #1a1a1a;padding:32px 40px 24px;background:linear-gradient(180deg,#0d0d0d,#080808)}
.wrap{max-width:960px;margin:0 auto}
.tag{font-size:11px;letter-spacing:4px;color:#c9a84c;font-weight:600;margin-bottom:6px}
h1{font-size:28px;font-weight:300;color:#fff;margin:0}
h1 span{color:#c9a84c;font-weight:600}
.sub{color:#555;font-size:13px;margin-top:8px}
.cnt{max-width:960px;margin:0 auto;padding:32px 40px}
.box{background:#0f0f0f;border:1px solid #1e1e1e;border-radius:8px;padding:24px;margin-bottom:24px}
.lbl{font-size:11px;letter-spacing:3px;color:#555;display:block;margin-bottom:12px;font-weight:600}
textarea{width:100%;min-height:140px;background:#080808;border:1px solid #222;border-radius:6px;color:#d0d0d0;font-size:14px;line-height:1.7;padding:14px 16px;resize:vertical;outline:none;box-sizing:border-box;font-family:inherit}
.row{display:flex;justify-content:space-between;align-items:center;margin-top:16px}
.info{font-size:12px;color:#444}
.btn{border:none;border-radius:6px;padding:12px 28px;font-size:13px;font-weight:600;letter-spacing:1px;cursor:pointer}
.bg{background:#c9a84c;color:#000}
.bx{background:#1a1a1a;color:#444;cursor:not-allowed}
.pb{margin-top:12px;height:2px;background:#1a1a1a;border-radius:1px}
.pf{height:100%;background:#c9a84c;border-radius:1px;transition:width 0.3s}
.grp{margin-bottom:20px}
.gl{display:flex;align-items:center;gap:12px;margin-bottom:10px;padding-bottom:8px}
.gline{flex:1;height:1px}
.card{border-radius:6px;overflow:hidden;margin-bottom:8px}
.ch{display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer}
.cb{padding:16px 18px 18px 52px;border-top:1px solid #141414}
.cb pre{font-size:12px;line-height:1.8;color:#999;white-space:pre-wrap;word-break:break-word;margin:0}
.bdg{font-size:9px;letter-spacing:2px;padding:2px 8px;border-radius:3px}
.ab{height:1px;overflow:hidden}
.af{height:100%;animation:sl 1.5s infinite}
.prop{margin-top:32px;background:linear-gradient(135deg,#0d0500,#150a00);border:1px solid rgba(201,168,76,.27);border-radius:8px;padding:28px}
.ptag{font-size:10px;letter-spacing:4px;color:#c9a84c;margin-bottom:16px;font-weight:700}
.prop pre{font-size:13px;line-height:1.9;color:#d0b96a;white-space:pre-wrap;word-break:break-word;margin:0}
@keyframes sl{0%{transform:translateX(-100%);width:40%}100%{transform:translateX(300%);width:40%}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
var NL=String.fromCharCode(10);
var API=String.fromCharCode(104,116,116,112,115,58,47,47,97,112,105,46,97,110,116,104,114,111,112,105,99,46,99,111,109,47,118,49,47,109,101,115,115,97,103,101,115);
var MDL="claude-sonnet-4-6";
var AG=[
{id:"o0",lv:0,nm:"Produksiyon Muduru",rl:"Tum sistemi yonetir",cl:"#c9a84c",pr:"Sen bir produksiyon mudurususun. Senaryoyu analiz et: 1.Genel kapsam 2.Cekim gun sayisi 3.Zorluk 4.Kritik notlar 5.Yaklasim onerisi. Turkce yaz."},
{id:"o1",lv:1,nm:"Brief Analiz",rl:"Hedef kitle, ton, platform",cl:"#7c3aed",pr:"Sen strateji uzmanisinin. 1.Hedef kitle 2.Ton 3.Ana mesaj 4.Platform onerileri 5.Sure. Turkce yaz."},
{id:"o2",lv:2,nm:"Konsept",rl:"Kreatif yon, mood",cl:"#d97706",pr:"Sen kreatif direktorsun. 1.Konsept basligi 2.Gorsel dil 3.Referanslar 4.Muzik 5.Mood kelimeleri. Turkce yaz."},
{id:"o3",lv:2,nm:"Storyboard",rl:"Sahne plani",cl:"#d97706",pr:"Sen storyboard sanatcisissin. Her sahne icin: no, cekim acisi, kamera hareketi, ana aksiyon, sure. Turkce yaz."},
{id:"o4",lv:2,nm:"Shot List",rl:"Teknik cekim listesi",cl:"#d97706",pr:"Sen asistan yonetmensin. Shotlist: no, cekim tipi, lens, kamera sistemi, isik, sure, oncelik. Turkce yaz."},
{id:"o5",lv:3,nm:"Lokasyon",rl:"Mekan, izin, kiralama",cl:"#16a34a",pr:"Sen lokasyon menajerisin. 1.Lokasyonlar 2.Izin gereksinimleri 3.Kira TL 4.Alternatifler 5.Toplam butce. Turkce yaz."},
{id:"o6",lv:3,nm:"Cast",rl:"Oyuncu, figuran",cl:"#16a34a",pr:"Sen casting direktorsun. 1.Oyuncu listesi 2.Profiller 3.Figuran sayisi 4.Ucret TL 5.Toplam cast butcesi. Turkce yaz."},
{id:"o7",lv:3,nm:"Ekipman",rl:"Kamera, isik, ses, drone",cl:"#16a34a",pr:"Sen ekipman koordinatorusun. 1.Kamera 2.Isik 3.Ses 4.Ozel ekipman 5.Gunluk kira TL 6.Toplam. Turkce yaz."},
{id:"o8",lv:3,nm:"Kadro",rl:"Yonetmen, DOP, ekip",cl:"#16a34a",pr:"Sen produksiyon koordinatorusun. 1.Zorunlu kadro 2.Freelance mi 3.Gunluk ucret TL 4.Gun sayisi 5.Toplam kadro butcesi. Turkce yaz."},
{id:"o9",lv:3,nm:"Takvim",rl:"Gun bazli plan",cl:"#16a34a",pr:"Sen asistan yonetmensin. 1.Pre-prod takvimi 2.Cekim gunu plani 3.Post takvimi 4.Toplam sure 5.Kritik riskler. Turkce yaz."},
{id:"p1",lv:4,nm:"Edit",rl:"Kurgu, versiyonlar",cl:"#2563eb",pr:"Sen kurgu direktorsun. 1.Edit sureci ve suresi 2.Yazilim onerisi 3.Teslim versiyonlari 4.Revizyon turlari 5.Edit butcesi TL. Turkce yaz."},
{id:"p2",lv:4,nm:"Renk ve VFX",rl:"Color grading, efektler",cl:"#2563eb",pr:"Sen post supervizorsun. 1.Color grading 2.VFX ihtiyaclari 3.Motion graphics 4.Format cikislari 5.Toplam butce TL. Turkce yaz."},
{id:"p3",lv:4,nm:"Ses ve Muzik",rl:"Muzik, seslendirme",cl:"#2563eb",pr:"Sen ses direktorsun. 1.Muzik stratejisi 2.Ses tasarimi 3.Seslendirme 4.Studio ihtiyaci 5.Toplam ses butcesi TL. Turkce yaz."},
{id:"q1",lv:5,nm:"Butce",rl:"Maliyet tablosu",cl:"#dc2626",pr:"Sen finans direktorsun. Konsolide butce: A.Pre-prod B.Cekim C.Post D.Genel yuzde on buffer. TOPLAM NET MALIYET TL. Gercekci rakamlarla yaz."},
{id:"q2",lv:5,nm:"Fiyatlama",rl:"Ajans kari, marj",cl:"#dc2626",pr:"Sen is gelistirme direktorsun. Net maliyetten fiyat: 1.Ajans ucreti yuzde 15-20 2.Kreatif bedel 3.Risk payi 4.Ekonomik Standart Premium paketler 5.Odeme plani. TL yaz."},
{id:"q3",lv:5,nm:"Teklif Belgesi",rl:"Musteri teklifi",cl:"#dc2626",pr:"Sen genel mudursun. Profesyonel musteri teklifi: 1.PROJE OZETI 2.KREATIF YAKLASIM 3.PRODUKSIYON KAPSAMI 4.TESLIMAT LISTESI 5.PROJE TAKVIMI 6.BUTCE OZETI uc secenek 7.ODEME KOSULLARI 8.NOTLAR. Turkce yaz."}
];
var LC={0:"#c9a84c",1:"#7c3aed",2:"#d97706",3:"#16a34a",4:"#2563eb",5:"#dc2626"};
var LN={0:"ORKESTRATOR",1:"STRATEJI",2:"KREATIF",3:"PRODUKSIYON",4:"POST-PRODUKSIYON",5:"MALIYET VE TEKLIF"};
var st={sc:"",rs:{},run:false,act:null,exp:null,prg:0};
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function ss(u){Object.assign(st,u);rd();}
async function ca(ag,ctx){
  ss({act:ag.id});
  try{
    var msg="Senaryo:"+NL+st.sc+(ctx?NL+NL+"Onceki:"+NL+ctx:"");
    var r=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:MDL,max_tokens:1000,system:ag.pr,messages:[{role:"user",content:msg}]})});
    var d=await r.json();
    var t=(d.content||[]).map(function(c){return c.text||"";}).join("")||"Yanit alinamadi.";
    var nr=Object.assign({},st.rs);nr[ag.id]=t;ss({rs:nr});return t;
  }catch(ex){var err="Hata: "+ex.message;var nr=Object.assign({},st.rs);nr[ag.id]=err;ss({rs:nr});return err;}
}
async function runAll(){
  if(!st.sc.trim())return;
  ss({run:true,rs:{},prg:0});
  var ctx="";
  for(var i=0;i<AG.length;i++){
    var a=AG[i];var r=await ca(a,ctx);
    ctx+=NL+NL+"["+a.nm+"]:"+NL+r;
    ss({prg:Math.round((i+1)/AG.length*100)});
  }
  ss({act:null,run:false});
}
function tg(id){ss({exp:st.exp===id?null:id});}
function rd(){
  var grp={};
  AG.forEach(function(a){if(!grp[a.lv])grp[a.lv]=[];grp[a.lv].push(a);});
  var done=Object.keys(st.rs).length;
  var h='<div class="hdr"><div class="wrap">';
  h+='<div class="tag">REKLAM PRODUKSIYON SISTEMI</div>';
  h+='<h1>Sinematik Produksiyon <span>Fiyat Ajani</span></h1>';
  h+='<p class="sub">16 uzman ajan &mdash; Senaryo analizi &mdash; Profesyonel maliyet teklifi</p>';
  h+='</div></div><div class="cnt">';
  h+='<div class="box"><label class="lbl">MUSTERI SENARYOSU</label>';
  h+='<textarea id="sc" placeholder="Musteri senaryosunu buraya yapistirin...">'+esc(st.sc)+'</textarea>';
  h+='<div class="row"><span class="info">'+(done>0?done+"/"+AG.length+" ajan tamamlandi":"")+'</span>';
  h+='<button class="btn '+(st.run?"bx":"bg")+'" onclick="go()">'+(st.run?"Calisiyor... %"+st.prg:"TUM AJANLARI CALISTIR")+'</button></div>';
  if(st.run)h+='<div class="pb"><div class="pf" style="width:'+st.prg+'%"></div></div>';
  h+='</div>';
  Object.keys(grp).sort(function(a,b){return a-b;}).forEach(function(lv){
    var agents=grp[lv];var lc=LC[lv];
    h+='<div class="grp"><div class="gl" style="border-bottom:1px solid '+lc+'22">';
    h+='<span style="font-size:10px;letter-spacing:3px;color:'+lc+';font-weight:700">SEVIYE '+lv+'</span>';
    h+='<span style="font-size:11px;color:#333;letter-spacing:2px">'+LN[lv]+'</span>';
    h+='<div class="gline" style="background:'+lc+'11"></div></div>';
    agents.forEach(function(a){
      var iA=st.act===a.id,iD=!!st.rs[a.id],iE=st.exp===a.id;
      h+='<div class="card" style="background:'+(iA?"#0d0d14":"#0c0c0c")+';border:1px solid '+(iA?a.cl+"44":iD?"#1e1e1e":"#141414")+'">';
      h+='<div class="ch" onclick="tg(''+a.id+'')">';
      h+='<span style="font-size:14px;color:'+(iA?a.cl:iD?a.cl+"99":"#2a2a2a")+';width:20px;text-align:center">&#9679;</span>';
      h+='<div style="flex:1"><div style="display:flex;align-items:center;gap:8px">';
      h+='<span style="font-size:13px;font-weight:600;color:'+(iA?"#fff":iD?"#ccc":"#444")+'">'+a.nm+'</span>';
      if(iA)h+='<span class="bdg" style="color:'+a.cl+';background:'+a.cl+'15">CALISIYOR</span>';
      if(iD&&!iA)h+='<span class="bdg" style="color:#16a34a;background:#16a34a15">TAMAMLANDI</span>';
      h+='</div><div style="font-size:11px;color:#333;margin-top:2px">'+a.rl+'</div></div>';
      if(iD)h+='<span style="color:#333;font-size:12px">'+(iE?"&#9650;":"&#9660;")+'</span>';
      h+='</div>';
      if(iA)h+='<div class="ab"><div class="af" style="background:linear-gradient(90deg,transparent,'+a.cl+',transparent)"></div></div>';
      if(iD&&iE)h+='<div class="cb"><pre>'+esc(st.rs[a.id])+'</pre></div>';
      h+='</div>';
    });
    h+='</div>';
  });
  if(st.rs.q3){
    h+='<div class="prop"><div class="ptag">MUSTERIYE SUNULACAK TEKLIF</div>';
    h+='<pre>'+esc(st.rs.q3)+'</pre></div>';
  }
  h+='</div>';
  document.getElementById("app").innerHTML=h;
  var sc=document.getElementById("sc");
  if(sc){sc.value=st.sc;sc.oninput=function(){st.sc=this.value;};}
}
function go(){
  if(st.run)return;
  var sc=document.getElementById("sc");
  if(sc)st.sc=sc.value;
  if(!st.sc.trim())return;
  runAll();
}
rd();
})();
</script>
</body>
</html>
